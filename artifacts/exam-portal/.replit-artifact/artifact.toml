kind = "web"
previewPath = "/"
title = "ExamPortal"
version = "1.0.0"
id = "artifacts/exam-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18926
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/exam-portal run dev"

[services.env]
PORT = "18926"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/exam-portal", "run", "build"]
publicDir = "artifacts/exam-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
