packages:
  "framer-motion": "For smooth page transitions, modal animations, and login tab switching"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to resolve Tailwind CSS class conflicts"
  "date-fns": "For formatting dates and countdown times"
  "react-hook-form": "For robust form state management and validation"
  "@hookform/resolvers": "Zod resolver for react-hook-form"
  "zod": "Schema validation for forms"

images:
  - path: "artifacts/exam-portal/public/images/login-bg.png"
    description: "A stunning, vibrant abstract background mesh using deep violet, vivid purple, and soft indigo gradients with subtle glass-like light refractions. Premium, modern, and clean."
    aspect_ratio: "16:9"

notes:
  - Uses standard React Query hooks generated by Orval and exposed via @workspace/api-client-react
  - Server-Sent Events (SSE) expects text/event-stream on /api/events to trigger refetches and push notifications
  - Auth is handled via HTTP-only cookies. /api/auth/me is used to check session validity.
  - Expects a service worker at /sw.js for background push notifications
